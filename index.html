<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivial 2.º ESO – IES San José Badajoz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    input[type=range] { accent-color: #facc15; width: 100%; }
  </style>
</head>
<body class="bg-indigo-950 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────────────
    // CONFIGURACIÓN
    // Opción A: deja API_KEY vacío → el profesor la introduce la
    //           primera vez y queda guardada en el navegador.
    // Opción B: pon tu clave aquí para que vaya directamente
    //           (solo en repositorios PRIVADOS).
    // ─────────────────────────────────────────────────────────────
    const API_KEY_FIJA = "";

    // ── Logos: reemplaza con tus imágenes reales ─────────────────
    // Ejemplo: <img src="logos/innovated.png" alt="INNOVATED" className="h-10" />
    // Sube tus logos a una carpeta /logos en el repo y ajusta las rutas.

    const CATEGORIAS = [
      { id: "matematicas",  label: "Matemáticas",        emoji: "🔢" },
      { id: "ciencias",     label: "Ciencias Naturales",  emoji: "🌿" },
      { id: "historia",     label: "Historia",            emoji: "🏛️" },
      { id: "geografia",    label: "Geografía",           emoji: "🌍" },
      { id: "lengua",       label: "Lengua y Literatura", emoji: "📖" },
      { id: "ingles",       label: "Inglés",              emoji: "🇬🇧" },
      { id: "tecnologia",   label: "Tecnología",          emoji: "⚙️"  },
      { id: "arte",         label: "Arte y Música",       emoji: "🎨" },
    ];

    const COLORES = {
      matematicas: "from-blue-500 to-blue-700",
      ciencias:    "from-green-500 to-green-700",
      historia:    "from-amber-500 to-amber-700",
      geografia:   "from-teal-500 to-teal-700",
      lengua:      "from-purple-500 to-purple-700",
      ingles:      "from-red-500 to-red-700",
      tecnologia:  "from-gray-500 to-gray-700",
      arte:        "from-pink-500 to-pink-700",
    };

    // ── Componentes de logos ─────────────────────────────────────
    function LogosHeader() {
      return (
        <div className="flex justify-center mb-4">
          <img src="logo.png" alt="Logos institucionales" className="max-h-20 w-auto" />
        </div>
      );
    }

    function LogosFooter() {
      return (
        <footer className="text-center text-indigo-400 text-xs mt-6 pb-4 border-t border-indigo-800 pt-3">
          <p className="font-semibold text-indigo-300">Cristina Ramos García · 2026</p>
          <p className="mt-0.5">Proyecto CITE-STEAM · IA-FP Robótica Inclusiva · IES San José, Badajoz</p>
        </footer>
      );
    }

    // ── Timer circular ────────────────────────────────────────────
    function TimerCircle({ segundos, total }) {
      const r = 22, circ = 2 * Math.PI * r;
      const pct = segundos / total;
      const color = pct > 0.5 ? "#facc15" : pct > 0.25 ? "#f97316" : "#ef4444";
      return (
        <svg width="60" height="60" viewBox="0 0 60 60">
          <circle cx="30" cy="30" r={r} fill="none" stroke="#312e81" strokeWidth="5"/>
          <circle cx="30" cy="30" r={r} fill="none" stroke={color} strokeWidth="5"
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
            strokeLinecap="round" transform="rotate(-90 30 30)"
            style={{transition:"stroke-dashoffset 0.9s linear,stroke 0.3s"}}/>
          <text x="30" y="35" textAnchor="middle" fill="white" fontSize="14" fontWeight="bold">{segundos}</text>
        </svg>
      );
    }

    // ── Pantalla introducción clave API ───────────────────────────
    function PantallaApiKey({ onGuardar }) {
      const [key, setKey] = useState("");
      return (
        <div className="min-h-screen bg-indigo-950 flex items-center justify-center p-4">
          <div className="bg-indigo-900 rounded-2xl p-8 max-w-md w-full border border-indigo-700 text-white text-center">
            <div className="text-5xl mb-3">🔑</div>
            <h2 className="text-2xl font-black text-yellow-300 mb-2">Clave API de Anthropic</h2>
            <p className="text-indigo-300 text-sm mb-5">
              Necesaria para generar las preguntas con IA.<br/>
              Se guarda solo en este navegador.
            </p>
            <input
              type="password"
              value={key}
              onChange={e => setKey(e.target.value)}
              onKeyDown={e => e.key === "Enter" && key.trim() && onGuardar(key.trim())}
              placeholder="sk-ant-..."
              className="w-full bg-indigo-800 border-2 border-indigo-600 rounded-xl px-4 py-3 text-white placeholder-indigo-400 mb-4 focus:outline-none focus:border-yellow-400"
            />
            <button
              onClick={() => key.trim() && onGuardar(key.trim())}
              className="w-full bg-yellow-400 hover:bg-yellow-300 text-indigo-950 font-black py-3 rounded-xl transition-all">
              Guardar y continuar →
            </button>
            <p className="text-indigo-500 text-xs mt-4">
              Obtén tu clave en <a href="https://console.anthropic.com" target="_blank" className="underline text-indigo-400">console.anthropic.com</a>
            </p>
          </div>
        </div>
      );
    }

    // ── App principal ─────────────────────────────────────────────
    function Trivial() {
      const [apiKey, setApiKey]             = useState(() => localStorage.getItem("trivial_eso_apikey") || API_KEY_FIJA);
      const [estado, setEstado]             = useState("inicio");
      const [seleccionadas, setSeleccionadas] = useState([]);
      const [numPreguntas, setNumPreguntas] = useState(10);
      const [timerActivo, setTimerActivo]   = useState(false);
      const [timerSeg, setTimerSeg]         = useState(20);
      const [tiempoRestante, setTiempoRestante] = useState(20);
      const [preguntas, setPreguntas]       = useState([]);
      const [actual, setActual]             = useState(0);
      const [respuesta, setRespuesta]       = useState(null);
      const [mostrarResp, setMostrarResp]   = useState(false);
      const [puntuacion, setPuntuacion]     = useState(0);
      const [historial, setHistorial]       = useState([]);
      const [error, setError]               = useState("");
      const intervaloRef                    = useRef(null);

      const guardarKey = (k) => { localStorage.setItem("trivial_eso_apikey", k); setApiKey(k); };
      const borrarKey  = ()  => { localStorage.removeItem("trivial_eso_apikey"); setApiKey(""); };

      // Timer
      useEffect(() => {
        if (estado !== "jugando" || mostrarResp || !timerActivo) return;
        setTiempoRestante(timerSeg);
        intervaloRef.current = setInterval(() => {
          setTiempoRestante(t => {
            if (t <= 1) {
              clearInterval(intervaloRef.current);
              setMostrarResp(true);
              setRespuesta(r => r === null ? -1 : r);
              return 0;
            }
            return t - 1;
          });
        }, 1000);
        return () => clearInterval(intervaloRef.current);
      }, [actual, estado, mostrarResp]);

      if (!apiKey) return <PantallaApiKey onGuardar={guardarKey} />;

      const toggleCat = id => setSeleccionadas(p => p.includes(id) ? p.filter(c=>c!==id) : [...p,id]);

      const iniciarJuego = async () => {
        if (!seleccionadas.length) { setError("¡Elige al menos una categoría!"); return; }
        setError(""); setEstado("cargando");
        const nombres = seleccionadas.map(id => CATEGORIAS.find(c=>c.id===id).label).join(", ");
        const prompt = `Eres un profesor de 2º de ESO en España. Genera exactamente ${numPreguntas} preguntas de trivial para alumnos de 13-14 años.
Categorías (repártelas equilibradamente): ${nombres}.
NIVEL: adecuado para 2º ESO, vocabulario sencillo, conceptos del currículo oficial español.
Responde ÚNICAMENTE con un objeto JSON válido, sin texto adicional ni bloques de código markdown:
{"preguntas":[{"pregunta":"...","opciones":["A","B","C","D"],"correcta":0,"categoria":"matematicas","explicacion":"..."}]}
Reglas estrictas:
- "categoria" debe ser exactamente uno de: ${seleccionadas.join(", ")}
- "correcta" es el índice 0-3 de la opción correcta
- Las 4 opciones deben ser plausibles
- "explicacion" es 1-2 frases educativas breves
- Todo en español`;
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 4000,
              messages: [{ role: "user", content: prompt }]
            })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const texto  = data.content.map(b=>b.text||"").join("");
          const parsed = JSON.parse(texto.replace(/```json|```/g,"").trim());
          setPreguntas(parsed.preguntas);
          setActual(0); setPuntuacion(0); setHistorial([]);
          setRespuesta(null); setMostrarResp(false);
          setEstado("jugando");
        } catch(e) {
          setEstado("inicio");
          setError("Error: " + e.message);
        }
      };

      const comprobar = () => {
        if (respuesta === null) { setError("Selecciona una respuesta."); return; }
        setError("");
        if (!mostrarResp) { clearInterval(intervaloRef.current); setMostrarResp(true); return; }
        const ok = respuesta === preguntas[actual].correcta;
        const nuevo = [...historial, { respuesta, correcta: ok }];
        setHistorial(nuevo);
        if (ok) setPuntuacion(p=>p+1);
        if (actual+1 < preguntas.length) {
          setActual(a=>a+1); setRespuesta(null); setMostrarResp(false);
        } else { setEstado("resultados"); }
      };

      const reiniciar = () => {
        clearInterval(intervaloRef.current);
        setEstado("inicio"); setPreguntas([]); setActual(0);
        setPuntuacion(0); setHistorial([]); setRespuesta(null); setMostrarResp(false); setError("");
      };

      // ── PANTALLA INICIO ────────────────────────────────────────
      if (estado === "inicio") return (
        <div className="min-h-screen bg-indigo-950 text-white p-4">
          <div className="max-w-2xl mx-auto">
            <LogosHeader />
            <div className="text-center py-4">
              <div className="text-5xl mb-1">🧠</div>
              <h1 className="text-4xl font-black text-yellow-300 mb-0.5">TRIVIAL</h1>
              <p className="text-indigo-300 font-semibold">2.º ESO · ¿Cuánto sabes?</p>
            </div>

            <div className="bg-indigo-900 rounded-2xl p-5 mb-4 border border-indigo-700">
              <h2 className="text-lg font-bold text-yellow-300 mb-3">📚 Elige las materias</h2>
              <div className="grid grid-cols-2 gap-2">
                {CATEGORIAS.map(cat => (
                  <button key={cat.id} onClick={()=>toggleCat(cat.id)}
                    className={`flex items-center gap-2 p-3 rounded-xl font-semibold text-sm transition-all border-2 ${
                      seleccionadas.includes(cat.id)
                        ? "bg-yellow-400 text-indigo-950 border-yellow-300"
                        : "bg-indigo-800 text-white border-indigo-600 hover:border-yellow-400"}`}>
                    <span className="text-xl">{cat.emoji}</span><span>{cat.label}</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="bg-indigo-900 rounded-2xl p-5 mb-4 border border-indigo-700">
              <h2 className="text-lg font-bold text-yellow-300 mb-3">🔢 Número de preguntas</h2>
              <div className="flex gap-3">
                {[5,10,15,20].map(n => (
                  <button key={n} onClick={()=>setNumPreguntas(n)}
                    className={`flex-1 py-3 rounded-xl font-bold text-lg transition-all border-2 ${
                      numPreguntas===n ? "bg-yellow-400 text-indigo-950 border-yellow-300" : "bg-indigo-800 text-white border-indigo-600 hover:border-yellow-400"}`}>{n}</button>
                ))}
              </div>
            </div>

            <div className="bg-indigo-900 rounded-2xl p-5 mb-4 border border-indigo-700">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-lg font-bold text-yellow-300">⏱️ Temporizador <span className="text-indigo-400 text-sm font-normal">(opcional)</span></h2>
                <button onClick={()=>setTimerActivo(t=>!t)}
                  className={`w-14 h-7 rounded-full transition-all relative border-2 ${timerActivo ? "bg-yellow-400 border-yellow-300" : "bg-indigo-700 border-indigo-500"}`}>
                  <span className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all ${timerActivo?"left-7":"left-0.5"}`}/>
                </button>
              </div>
              {timerActivo && (
                <div>
                  <p className="text-indigo-300 text-sm mb-2">Segundos por pregunta: <span className="text-yellow-300 font-bold">{timerSeg}s</span></p>
                  <input type="range" min="10" max="60" step="5" value={timerSeg} onChange={e=>setTimerSeg(Number(e.target.value))}/>
                  <div className="flex justify-between text-xs text-indigo-400 mt-1"><span>10s</span><span>60s</span></div>
                </div>
              )}
            </div>

            {error && <p className="text-red-400 text-center font-semibold mb-3">{error}</p>}

            <button onClick={iniciarJuego}
              className="w-full bg-yellow-400 hover:bg-yellow-300 text-indigo-950 font-black py-4 rounded-2xl text-xl shadow-xl transition-all mb-3">
              ¡JUGAR! 🚀
            </button>
            <div className="text-center">
              <button onClick={borrarKey} className="text-indigo-500 text-xs hover:text-indigo-300 underline">
                Cambiar clave API
              </button>
            </div>
            <LogosFooter />
          </div>
        </div>
      );

      // ── CARGANDO ───────────────────────────────────────────────
      if (estado === "cargando") return (
        <div className="min-h-screen bg-indigo-950 text-white flex flex-col items-center justify-center gap-4">
          <div className="text-6xl animate-bounce">🧠</div>
          <div className="animate-spin w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full"/>
          <p className="text-yellow-300 font-bold text-lg">Preparando tu trivial…</p>
        </div>
      );

      // ── JUGANDO ────────────────────────────────────────────────
      if (estado === "jugando") {
        const q = preguntas[actual];
        const catInfo = CATEGORIAS.find(c=>c.id===q.categoria) || {emoji:"❓",label:q.categoria};
        const grad = COLORES[q.categoria] || "from-indigo-500 to-indigo-700";
        const agotado = timerActivo && tiempoRestante === 0;

        return (
          <div className="min-h-screen bg-indigo-950 text-white p-4">
            <div className="max-w-2xl mx-auto">
              <div className="flex justify-between items-center mb-2 text-sm font-bold text-indigo-300">
                <span>Pregunta {actual+1} / {preguntas.length}</span>
                <span className="text-yellow-300">⭐ {puntuacion}</span>
              </div>
              <div className="w-full bg-indigo-800 rounded-full h-3 mb-4">
                <div className="bg-yellow-400 h-3 rounded-full transition-all" style={{width:`${(actual/preguntas.length)*100}%`}}/>
              </div>

              <div className={`bg-gradient-to-br ${grad} rounded-2xl p-5 mb-4 shadow-xl`}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className="text-2xl">{catInfo.emoji}</span>
                    <span className="text-sm font-bold opacity-90">{catInfo.label}</span>
                  </div>
                  {timerActivo && !mostrarResp && <TimerCircle segundos={tiempoRestante} total={timerSeg}/>}
                </div>
                <p className="text-xl font-bold leading-snug mt-3">{q.pregunta}</p>
              </div>

              {agotado && !mostrarResp && (
                <div className="bg-red-900 border border-red-500 rounded-xl p-3 mb-3 text-center">
                  <p className="text-red-300 font-bold">⏰ ¡Tiempo agotado!</p>
                </div>
              )}

              <div className="space-y-3 mb-4">
                {q.opciones.map((op, i) => {
                  let cls = "w-full p-4 rounded-xl font-semibold text-left transition-all border-2 flex items-center gap-3 ";
                  if (mostrarResp) {
                    if (i===q.correcta)              cls += "bg-green-500 border-green-300 text-white";
                    else if (i===respuesta)          cls += "bg-red-500 border-red-300 text-white";
                    else                             cls += "bg-indigo-800 border-indigo-600 text-indigo-300 opacity-60";
                  } else {
                    cls += respuesta===i ? "bg-yellow-400 border-yellow-300 text-indigo-950" : "bg-indigo-800 border-indigo-600 text-white hover:border-yellow-400";
                  }
                  return (
                    <button key={i} disabled={mostrarResp||agotado}
                      onClick={()=>{setRespuesta(i);setError("");}} className={cls}>
                      <span className="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center font-black text-sm shrink-0">
                        {["A","B","C","D"][i]}
                      </span>
                      {op}
                      {mostrarResp && i===q.correcta && <span className="ml-auto">✅</span>}
                      {mostrarResp && i===respuesta && i!==q.correcta && <span className="ml-auto">❌</span>}
                    </button>
                  );
                })}
              </div>

              {mostrarResp && (
                <div className="bg-indigo-900 border border-indigo-600 rounded-xl p-4 mb-4 text-sm text-indigo-200">
                  <span className="font-bold text-yellow-300">💡 </span>{q.explicacion}
                </div>
              )}
              {error && <p className="text-red-400 text-center font-semibold mb-2">{error}</p>}

              <button onClick={comprobar}
                className="w-full bg-yellow-400 hover:bg-yellow-300 text-indigo-950 font-black py-4 rounded-2xl text-lg shadow-xl transition-all">
                {!mostrarResp ? "Comprobar ✔️" : actual+1===preguntas.length ? "Ver resultados 🏆" : "Siguiente ➡️"}
              </button>
            </div>
          </div>
        );
      }

      // ── RESULTADOS ─────────────────────────────────────────────
      const pct  = Math.round((puntuacion/preguntas.length)*100);
      const emj  = pct>=80?"🏆":pct>=60?"👍":pct>=40?"😅":"📚";
      const msg  = pct>=80?"¡Brillante!":pct>=60?"¡Buen trabajo!":pct>=40?"Puedes mejorar":"¡A estudiar más!";

      return (
        <div className="min-h-screen bg-indigo-950 text-white p-4">
          <div className="max-w-2xl mx-auto">
            <LogosHeader />
            <div className="text-center py-6">
              <div className="text-7xl mb-2">{emj}</div>
              <h1 className="text-4xl font-black text-yellow-300 mb-1">{msg}</h1>
              <p className="text-2xl font-bold">{puntuacion} / {preguntas.length} · {pct}%</p>
            </div>
            <div className="space-y-3 mb-6 max-h-96 overflow-y-auto pr-1">
              {preguntas.map((q,i) => {
                const ok = historial[i]?.correcta;
                const cat = CATEGORIAS.find(c=>c.id===q.categoria)||{emoji:"❓"};
                return (
                  <div key={i} className={`rounded-xl p-4 border-2 ${ok?"border-green-500 bg-green-900/30":"border-red-500 bg-red-900/30"}`}>
                    <div className="flex items-start gap-2">
                      <span className="text-lg shrink-0">{ok?"✅":"❌"}</span>
                      <div className="text-sm">
                        <p className="font-semibold mb-1">{cat.emoji} {q.pregunta}</p>
                        {!ok && historial[i]?.respuesta>=0 && <p className="text-red-300">Tu respuesta: {q.opciones[historial[i].respuesta]}</p>}
                        {!ok && historial[i]?.respuesta<0  && <p className="text-orange-300">⏰ Tiempo agotado</p>}
                        <p className="text-green-300">Correcta: {q.opciones[q.correcta]}</p>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <button onClick={reiniciar}
              className="w-full bg-yellow-400 hover:bg-yellow-300 text-indigo-950 font-black py-4 rounded-2xl text-xl shadow-xl transition-all">
              Jugar otra vez 🔄
            </button>
            <LogosFooter />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Trivial />);
  </script>
</body>
</html>
